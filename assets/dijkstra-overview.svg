<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="420" fill="#0f1117" rx="16"/>
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Dijkstra's Algorithm — Shortest Path</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Greedy BFS with a min-heap — always process the closest unvisited node</text>

  <!-- === Graph === -->
  <!-- Edges first (behind nodes) -->
  <!-- A-B: 4 -->
  <line x1="160" y1="180" x2="310" y2="130" stroke="#475569" stroke-width="2"/>
  <text x="228" y="142" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">4</text>
  <!-- A-C: 2 -->
  <line x1="160" y1="180" x2="160" y2="300" stroke="#475569" stroke-width="2"/>
  <text x="143" y="245" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">2</text>
  <!-- B-C: 5 -->
  <line x1="310" y1="130" x2="160" y2="300" stroke="#475569" stroke-width="2"/>
  <text x="222" y="228" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">5</text>
  <!-- B-D: 10 -->
  <line x1="310" y1="130" x2="480" y2="130" stroke="#475569" stroke-width="2"/>
  <text x="395" y="118" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">10</text>
  <!-- C-D: 3 -->
  <line x1="160" y1="300" x2="480" y2="300" stroke="#475569" stroke-width="2"/>
  <text x="320" y="320" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">3</text>
  <!-- B-E: 11 -->
  <line x1="310" y1="130" x2="480" y2="300" stroke="#475569" stroke-width="2"/>
  <text x="412" y="194" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">11</text>
  <!-- D-E: 4 -->
  <line x1="480" y1="130" x2="480" y2="300" stroke="#475569" stroke-width="2"/>
  <text x="500" y="218" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">4</text>
  <!-- D-F: 9 -->
  <line x1="480" y1="130" x2="650" y2="215" stroke="#4ade80" stroke-width="2.5" stroke-dasharray="none"/>
  <text x="573" y="160" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="600">9</text>
  <!-- E-F: 7 -->
  <line x1="480" y1="300" x2="650" y2="215" stroke="#4ade80" stroke-width="2.5"/>
  <text x="578" y="275" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="600">7</text>

  <!-- Shortest path highlight -->
  <line x1="160" y1="180" x2="160" y2="300" stroke="#818cf8" stroke-width="3.5" opacity="0.8"/>
  <line x1="160" y1="300" x2="480" y2="300" stroke="#818cf8" stroke-width="3.5" opacity="0.8"/>
  <line x1="480" y1="300" x2="650" y2="215" stroke="#818cf8" stroke-width="3.5" opacity="0.8"/>

  <!-- Nodes -->
  <!-- A (start) -->
  <circle cx="160" cy="180" r="26" fill="#1e1b4b" stroke="#818cf8" stroke-width="2.5"/>
  <text x="160" y="177" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">A</text>
  <text x="160" y="193" text-anchor="middle" fill="#a5b4fc" font-size="10">dist=0</text>
  <!-- B -->
  <circle cx="310" cy="130" r="26" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="310" y="127" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">B</text>
  <text x="310" y="143" text-anchor="middle" fill="#64748b" font-size="10">dist=4</text>
  <!-- C -->
  <circle cx="160" cy="300" r="26" fill="#1e1b4b" stroke="#818cf8" stroke-width="2.5"/>
  <text x="160" y="297" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">C</text>
  <text x="160" y="313" text-anchor="middle" fill="#a5b4fc" font-size="10">dist=2</text>
  <!-- D -->
  <circle cx="480" cy="130" r="26" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="480" y="127" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">D</text>
  <text x="480" y="143" text-anchor="middle" fill="#64748b" font-size="10">dist=5</text>
  <!-- E -->
  <circle cx="480" cy="300" r="26" fill="#1e1b4b" stroke="#818cf8" stroke-width="2.5"/>
  <text x="480" y="297" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">E</text>
  <text x="480" y="313" text-anchor="middle" fill="#a5b4fc" font-size="10">dist=5</text>
  <!-- F (end) -->
  <circle cx="650" cy="215" r="26" fill="#052e16" stroke="#4ade80" stroke-width="2.5"/>
  <text x="650" y="212" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700">F</text>
  <text x="650" y="228" text-anchor="middle" fill="#86efac" font-size="10">dist=12</text>

  <!-- START / END badges -->
  <rect x="122" y="145" width="36" height="16" rx="4" fill="#818cf8"/>
  <text x="140" y="157" text-anchor="middle" fill="white" font-size="9" font-weight="700">START</text>
  <rect x="620" y="180" width="60" height="16" rx="4" fill="#4ade80"/>
  <text x="650" y="192" text-anchor="middle" fill="#052e16" font-size="9" font-weight="700">SHORTEST</text>

  <!-- Blue path label -->
  <text x="280" y="390" text-anchor="middle" fill="#818cf8" font-size="12">━━━ Shortest path A→F</text>
  <text x="280" y="408" text-anchor="middle" fill="#a5b4fc" font-size="11">A→C→E→F  =  2+3+7 = 12</text>

  <!-- === Step table === -->
  <rect x="700" y="80" width="180" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="790" y="102" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Iteration Steps</text>
  <line x1="710" y1="108" x2="870" y2="108" stroke="#334155" stroke-width="1"/>

  <!-- headers -->
  <text x="730" y="124" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">Pop</text>
  <text x="790" y="124" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">Dist</text>
  <text x="850" y="124" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">Updates</text>
  <line x1="710" y1="130" x2="870" y2="130" stroke="#334155" stroke-width="0.5"/>

  <!-- rows -->
  <text x="730" y="148" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">A</text>
  <text x="790" y="148" text-anchor="middle" fill="#94a3b8" font-size="11">0</text>
  <text x="850" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">B=4 C=2</text>

  <text x="730" y="170" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">C</text>
  <text x="790" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">2</text>
  <text x="850" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">D=5 E=5</text>

  <text x="730" y="192" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">B</text>
  <text x="790" y="192" text-anchor="middle" fill="#94a3b8" font-size="11">4</text>
  <text x="850" y="192" text-anchor="middle" fill="#94a3b8" font-size="10">no update</text>

  <text x="730" y="214" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">D</text>
  <text x="790" y="214" text-anchor="middle" fill="#94a3b8" font-size="11">5</text>
  <text x="850" y="214" text-anchor="middle" fill="#94a3b8" font-size="10">F=14</text>

  <text x="730" y="236" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">E</text>
  <text x="790" y="236" text-anchor="middle" fill="#94a3b8" font-size="11">5</text>
  <text x="850" y="236" text-anchor="middle" fill="#4ade80" font-size="10">F=12 ✓</text>

  <text x="730" y="258" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">F</text>
  <text x="790" y="258" text-anchor="middle" fill="#4ade80" font-size="11">12</text>
  <text x="850" y="258" text-anchor="middle" fill="#4ade80" font-size="10">DONE ✅</text>

  <line x1="710" y1="266" x2="870" y2="266" stroke="#334155" stroke-width="0.5"/>
  <text x="790" y="283" text-anchor="middle" fill="#94a3b8" font-size="10">Min-heap always</text>
  <text x="790" y="297" text-anchor="middle" fill="#94a3b8" font-size="10">pops closest node</text>

  <rect x="714" y="306" width="152" height="62" rx="6" fill="#052e16"/>
  <text x="790" y="323" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">Complexity</text>
  <text x="790" y="340" text-anchor="middle" fill="#86efac" font-size="10">Time: O((V+E) log V)</text>
  <text x="790" y="356" text-anchor="middle" fill="#86efac" font-size="10">Space: O(V)</text>
</svg>
