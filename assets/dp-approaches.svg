<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="320" fill="#0f1117" rx="16"/>
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Two DP Approaches — fib(4)</text>

  <!-- TOP DOWN label -->
  <text x="210" y="68" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">Top-Down (Memoization)</text>
  <text x="210" y="86" text-anchor="middle" fill="#94a3b8" font-size="11">Recursive + cache results</text>

  <!-- Top-down flow (vertical) -->
  <!-- fib(4) -->
  <rect x="154" y="98" width="112" height="30" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="210" y="118" text-anchor="middle" fill="#818cf8" font-size="13">fib(4) → ?</text>
  <line x1="210" y1="128" x2="210" y2="146" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- fib(3) -->
  <rect x="154" y="146" width="112" height="30" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="210" y="166" text-anchor="middle" fill="#818cf8" font-size="13">fib(3) → ?</text>
  <line x1="210" y1="176" x2="210" y2="194" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- fib(2) -->
  <rect x="154" y="194" width="112" height="30" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="210" y="214" text-anchor="middle" fill="#818cf8" font-size="13">fib(2) → ?</text>
  <line x1="210" y1="224" x2="210" y2="242" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- fib(1) base -->
  <rect x="154" y="242" width="112" height="30" rx="8" fill="#312e81" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="210" y="262" text-anchor="middle" fill="#a5b4fc" font-size="13">fib(1) = 1 ✓</text>

  <!-- return arrows -->
  <line x1="272" y1="257" x2="285" y2="257" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="285" y1="209" x2="285" y2="257" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="272" y1="209" x2="285" y2="209" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="285" y1="161" x2="285" y2="209" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="272" y1="161" x2="285" y2="161" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="285" y1="113" x2="285" y2="161" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="272" y1="113" x2="285" y2="113" stroke="#4ade80" stroke-width="1.5"/>
  <text x="291" y="193" fill="#4ade80" font-size="10" transform="rotate(90,291,193)">return↑</text>

  <text x="210" y="295" text-anchor="middle" fill="#94a3b8" font-size="11">Call stack builds down, answers bubble up</text>

  <!-- DIVIDER -->
  <line x1="430" y1="55" x2="430" y2="300" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="450" y="190" text-anchor="middle" fill="#475569" font-size="22" transform="rotate(90,450,190)">vs</text>

  <!-- BOTTOM UP label -->
  <text x="680" y="68" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700">Bottom-Up (Tabulation)</text>
  <text x="680" y="86" text-anchor="middle" fill="#94a3b8" font-size="11">Iterative + fill table from base cases</text>

  <!-- table cells -->
  <text x="480" y="115" fill="#64748b" font-size="11">dp[ ]</text>
  <!-- index labels -->
  <text x="524" y="115" text-anchor="middle" fill="#64748b" font-size="11">0</text>
  <text x="584" y="115" text-anchor="middle" fill="#64748b" font-size="11">1</text>
  <text x="644" y="115" text-anchor="middle" fill="#64748b" font-size="11">2</text>
  <text x="704" y="115" text-anchor="middle" fill="#64748b" font-size="11">3</text>
  <text x="764" y="115" text-anchor="middle" fill="#64748b" font-size="11">4</text>
  <text x="832" y="115" text-anchor="middle" fill="#64748b" font-size="11">5</text>

  <!-- Step 0: base -->
  <text x="466" y="145" fill="#94a3b8" font-size="10">Step 1</text>
  <rect x="504" y="128" width="40" height="30" rx="5" fill="#312e81" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="524" y="148" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600">0</text>
  <rect x="564" y="128" width="40" height="30" rx="5" fill="#312e81" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="584" y="148" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600">1</text>
  <rect x="624" y="128" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="644" y="148" text-anchor="middle" fill="#475569" font-size="13">?</text>
  <rect x="684" y="128" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="704" y="148" text-anchor="middle" fill="#475569" font-size="13">?</text>
  <rect x="744" y="128" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="764" y="148" text-anchor="middle" fill="#475569" font-size="13">?</text>
  <rect x="814" y="128" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="834" y="148" text-anchor="middle" fill="#475569" font-size="13">?</text>
  <text x="504" y="168" fill="#a5b4fc" font-size="9">base</text>
  <text x="564" y="168" fill="#a5b4fc" font-size="9">base</text>

  <!-- Step 2 -->
  <text x="466" y="197" fill="#94a3b8" font-size="10">Step 2</text>
  <rect x="504" y="178" width="40" height="30" rx="5" fill="#312e81" stroke="#475569" stroke-width="1"/>
  <text x="524" y="198" text-anchor="middle" fill="#94a3b8" font-size="13">0</text>
  <rect x="564" y="178" width="40" height="30" rx="5" fill="#312e81" stroke="#475569" stroke-width="1"/>
  <text x="584" y="198" text-anchor="middle" fill="#94a3b8" font-size="13">1</text>
  <rect x="624" y="178" width="40" height="30" rx="5" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="644" y="198" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">1</text>
  <rect x="684" y="178" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="704" y="198" text-anchor="middle" fill="#475569" font-size="13">?</text>
  <rect x="744" y="178" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="764" y="198" text-anchor="middle" fill="#475569" font-size="13">?</text>
  <rect x="814" y="178" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="834" y="198" text-anchor="middle" fill="#475569" font-size="13">?</text>
  <text x="624" y="218" fill="#4ade80" font-size="9">0+1=1</text>

  <!-- Step 3 -->
  <text x="466" y="247" fill="#94a3b8" font-size="10">Step 3</text>
  <rect x="504" y="228" width="40" height="30" rx="5" fill="#312e81" stroke="#475569" stroke-width="1"/>
  <text x="524" y="248" text-anchor="middle" fill="#94a3b8" font-size="13">0</text>
  <rect x="564" y="228" width="40" height="30" rx="5" fill="#312e81" stroke="#475569" stroke-width="1"/>
  <text x="584" y="248" text-anchor="middle" fill="#94a3b8" font-size="13">1</text>
  <rect x="624" y="228" width="40" height="30" rx="5" fill="#052e16" stroke="#475569" stroke-width="1"/>
  <text x="644" y="248" text-anchor="middle" fill="#94a3b8" font-size="13">1</text>
  <rect x="684" y="228" width="40" height="30" rx="5" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="704" y="248" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">2</text>
  <rect x="744" y="228" width="40" height="30" rx="5" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="764" y="248" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">3</text>
  <rect x="814" y="228" width="40" height="30" rx="5" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="834" y="248" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">5</text>
  <text x="684" y="268" fill="#4ade80" font-size="9">1+1=2</text>
  <text x="744" y="268" fill="#4ade80" font-size="9">1+2=3</text>
  <text x="814" y="268" fill="#4ade80" font-size="9">2+3=5</text>

  <text x="680" y="295" text-anchor="middle" fill="#94a3b8" font-size="11">Fill left→right; each cell uses two previous cells</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#818cf8" stroke-width="2"/>
    </marker>
  </defs>
</svg>
