<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="400" fill="#0f1117" rx="16"/>
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Sliding Window Pattern</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Expand right pointer, shrink left pointer — O(n) instead of O(n²)</text>

  <!-- === Fixed Window (top) === -->
  <text x="450" y="85" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">Fixed Window — Max sum of k=3 consecutive elements</text>
  <text x="450" y="100" text-anchor="middle" fill="#64748b" font-size="11">arr = [2, 1, 5, 1, 3, 2]</text>

  <!-- Array cells -->
  <!-- Row 1: initial window -->
  <text x="44" y="122" fill="#64748b" font-size="10">Step 1</text>
  <rect x="80" y="108" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="105" y="130" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">2</text>
  <rect x="134" y="108" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="159" y="130" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">1</text>
  <rect x="188" y="108" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="213" y="130" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">5</text>
  <rect x="242" y="108" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="267" y="130" text-anchor="middle" fill="#64748b" font-size="15">1</text>
  <rect x="296" y="108" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="321" y="130" text-anchor="middle" fill="#64748b" font-size="15">3</text>
  <rect x="350" y="108" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="375" y="130" text-anchor="middle" fill="#64748b" font-size="15">2</text>
  <text x="440" y="128" fill="#94a3b8" font-size="11">sum = 2+1+5 = <tspan fill="#4ade80" font-weight="700">8</tspan></text>

  <!-- Row 2 -->
  <text x="44" y="172" fill="#64748b" font-size="10">Step 2</text>
  <rect x="80" y="158" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="105" y="180" text-anchor="middle" fill="#64748b" font-size="15">2</text>
  <rect x="134" y="158" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="159" y="180" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">1</text>
  <rect x="188" y="158" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="213" y="180" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">5</text>
  <rect x="242" y="158" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="267" y="180" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">1</text>
  <rect x="296" y="158" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="321" y="180" text-anchor="middle" fill="#64748b" font-size="15">3</text>
  <rect x="350" y="158" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="375" y="180" text-anchor="middle" fill="#64748b" font-size="15">2</text>
  <text x="440" y="178" fill="#94a3b8" font-size="11">sum = 1+5+1 = <tspan fill="#f59e0b" font-weight="700">7</tspan></text>

  <!-- Row 3 (max) -->
  <text x="44" y="222" fill="#64748b" font-size="10">Step 3</text>
  <rect x="80" y="208" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="105" y="230" text-anchor="middle" fill="#64748b" font-size="15">2</text>
  <rect x="134" y="208" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="159" y="230" text-anchor="middle" fill="#64748b" font-size="15">1</text>
  <rect x="188" y="208" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="213" y="230" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">5</text>
  <rect x="242" y="208" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="267" y="230" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">1</text>
  <rect x="296" y="208" width="50" height="34" rx="6" fill="#1c3528" stroke="#4ade80" stroke-width="2"/>
  <text x="321" y="230" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">3</text>
  <rect x="350" y="208" width="50" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="375" y="230" text-anchor="middle" fill="#64748b" font-size="15">2</text>
  <text x="440" y="218" fill="#94a3b8" font-size="11">sum = 5+1+3 = <tspan fill="#4ade80" font-weight="700">9</tspan></text>
  <rect x="490" y="207" width="60" height="18" rx="4" fill="#052e16"/>
  <text x="520" y="220" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">MAX ✓</text>

  <!-- Divider -->
  <line x1="30" y1="258" x2="870" y2="258" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- === Variable Window (bottom) === -->
  <text x="450" y="278" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="700">Variable Window — Longest subarray with sum ≤ target=7</text>
  <text x="450" y="293" text-anchor="middle" fill="#64748b" font-size="11">arr = [4, 2, 1, 6, 3, 1, 2]     target = 7</text>

  <!-- Cells -->
  <rect x="50" y="304" width="44" height="34" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="72" y="326" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">4</text>
  <rect x="98" y="304" width="44" height="34" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="120" y="326" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">2</text>
  <rect x="146" y="304" width="44" height="34" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="168" y="326" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">1</text>
  <rect x="194" y="304" width="44" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="216" y="326" text-anchor="middle" fill="#64748b" font-size="14">6</text>
  <rect x="242" y="304" width="44" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="264" y="326" text-anchor="middle" fill="#64748b" font-size="14">3</text>
  <rect x="290" y="304" width="44" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="312" y="326" text-anchor="middle" fill="#64748b" font-size="14">1</text>
  <rect x="338" y="304" width="44" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="326" text-anchor="middle" fill="#64748b" font-size="14">2</text>

  <!-- L / R pointer labels -->
  <text x="72" y="350" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">L</text>
  <text x="168" y="350" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">R</text>

  <!-- Window bracket -->
  <line x1="52" y1="360" x2="52" y2="368" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="52" y1="368" x2="190" y2="368" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="190" y1="360" x2="190" y2="368" stroke="#818cf8" stroke-width="1.5"/>
  <text x="121" y="382" text-anchor="middle" fill="#818cf8" font-size="10">4+2+1=7 ✓ window=3</text>

  <!-- Explanation column -->
  <rect x="415" y="295" width="455" height="92" rx="10" fill="#1e293b"/>
  <text x="422" y="314" fill="#e2e8f0" font-size="11" font-weight="600">Variable window logic:</text>
  <text x="422" y="332" fill="#94a3b8" font-size="10">• Expand R: add arr[R] to sum</text>
  <text x="422" y="348" fill="#94a3b8" font-size="10">• If sum > target: shrink from L (subtract arr[L], L++)</text>
  <text x="422" y="364" fill="#94a3b8" font-size="10">• Track max window size = R - L + 1</text>
  <text x="422" y="380" fill="#f59e0b" font-size="10">• Each element enters and exits window exactly once → O(n)</text>
</svg>
